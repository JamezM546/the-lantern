<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheLantern</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap">
</head>
<body>
        <nav class="navbar"> 
            <a href="">Home</a> 
            <a href="">Browse</a> 
            <a href="">My List</a> 
            <!--<a href="">Games</a>-->
        </nav>

        <main class ="main">

            <section class ="hero">
                 <h1>TheLantern</h1>
                 <p class="tagline">Your cozy corner for manga discovery!</p>
                 <div class="search-bar">
                    <input type="text"id="search-input" placeholder="What am I feeling today?">
                    <button id="search-btn">Search</button>
                    <button id="clear-btn">Clear</button>
                 </div>
            </section>

            <section class ="results">
                <h2 id="status-message">Trending!</h2>
                <div id="manga-list"></div>
            </section>
           
        </main>
        <div id="modal-background" class="hidden">
            <div class="modal-content">
                <button id ="close-modal">X</button>
                <div id="modal-body"></div>
            </div>
        </div>
        <script src="app.js"></script>
    <footer class = "footer">Made with 🏮 by James</footer>
</body>
</html>
