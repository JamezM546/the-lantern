<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheLantern</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap">
</head>
<body>
        <nav class="navbar"> 
            <a href="" id="home-link">Home</a> 
            <a href="">Browse</a> 
            <a href="" id="mylist-link">My List</a> 
            <!--<a href="">Games</a>-->
        </nav>

        <main class ="main">

            <section class ="hero">
                 <h1>TheLantern</h1>
                 <p class="tagline" id="greeting">Your cozy corner for manga discovery!</p>
                 <div class="search-bar">
                    <input type="text"id="search-input" placeholder="What am I feeling today?">
                    <button id="search-btn">Search</button>
                    <button id="clear-btn">Clear</button>
                 </div>
            </section>

            <div id="genre-bar">
                <button class="genre-btn">Action</button>
                <button class="genre-btn">Romance</button>
                <button class="genre-btn">Comedy</button>
                <button class="genre-btn">Fantasy</button>
                <button class="genre-btn">Horror</button>
                <button class="genre-btn">Sci-Fi</button>
                <button class="genre-btn">Slice of Life</button>
            </div>

            <section class ="results">
                <h2 id="status-message">Trending!</h2>
                <div id="manga-list"></div>
            </section>
           
        </main>
        <div id="modal-background" class="hidden">
            <div class="modal-content">
                <button id ="close-modal">X</button>
                <div id="modal-body"></div>
            </div>
        </div>
        <div id="toast" class="hidden"></div>
        <script src="app.js"></script>
    <footer class = "footer">Made with 🏮 by James</footer>
</body>
</html>
